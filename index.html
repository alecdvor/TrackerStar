<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Assembly Tracker Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>TRACKER // RNBO ENGINE</h1>
        <button id="start-audio">INITIALIZE AUDIO</button>
    </header>
    
    <main>
        <div id="tracker-grid"></div>
    </main>

        <div id="gamepad">
        <div class="d-pad">
            <button id="btn-up" class="pad-btn">▲</button>
            <div class="d-pad-middle">
                <button id="btn-left" class="pad-btn">◀</button>
                <button id="btn-right" class="pad-btn">▶</button>
            </div>
            <button id="btn-down" class="pad-btn">▼</button>
        </div>
        
        <div class="system-buttons">
            <button id="btn-select" class="sys-btn">SELECT</button>
            <button id="btn-start" class="sys-btn">START</button>
        </div>

        <div class="action-diamond">
            <button id="btn-x" class="action-btn top">X</button>
            <button id="btn-y" class="action-btn left">Y</button>
            <button id="btn-a" class="action-btn right">A</button>
            <button id="btn-b" class="action-btn bottom">B</button>
        </div>
    </div>


    <script type="text/javascript" src="export/rnbo.js"></script>
    <script type="text/javascript" src="app.js"></script>
</body>
</html>
